<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A_Rafeh</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --chat-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --user-msg: #0284c7;
            --bot-msg: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-main);
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 650px;
            background-color: var(--chat-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #334155;
        }

        .chat-header {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }

        .bot-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar-main {
            width: 40px;
            height: 40px;
            background-color: var(--accent);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
        }

        .bot-status h3 {
            font-size: 16px;
            font-weight: 600;
        }

        .status-dot {
            font-size: 12px;
            color: #4ade80;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            background: none;
            border: 1px solid #475569;
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
            font-weight: 500;
        }

        .stop-btn:hover {
            background-color: #f97316;
            color: white;
            border-color: #f97316;
        }

        .clear-btn:hover {
            background-color: #ef4444;
            color: white;
            border-color: #ef4444;
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 85%;
            align-items: flex-start;
        }

        .user-message {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .bot-message {
            align-self: flex-start;
        }

        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .user-message .msg-avatar { background-color: #e2e8f0; color: #0f172a; }
        .bot-message .msg-avatar { background-color: var(--accent); color: #0f172a; }

        .text {
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }

        .user-message .text {
            background-color: var(--user-msg);
            color: white;
            border-top-right-radius: 2px;
        }

        .bot-message .text {
            background-color: var(--bot-msg);
            color: var(--text-main);
            border-top-left-radius: 2px;
        }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            gap: 4px;
            background-color: var(--bot-msg);
            padding: 12px 16px;
            border-radius: 14px;
            border-top-left-radius: 2px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background-color: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        .input-area {
            padding: 16px;
            background-color: #0f172a;
            display: flex;
            gap: 10px;
            border-top: 1px solid #334155;
        }

        input {
            flex: 1;
            background-color: #1e293b;
            border: 1px solid #334155;
            padding: 12px 16px;
            border-radius: 10px;
            color: white;
            outline: none;
            font-size: 14px;
        }

        input:focus {
            border-color: var(--accent);
        }

        button.send-btn {
            background-color: var(--accent);
            border: none;
            color: #0f172a;
            padding: 0 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button.send-btn:hover {
            background-color: var(--accent-hover);
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <!-- Header -->
        <div class="chat-header">
            <div class="bot-profile">
                <div class="avatar-main">🤖</div>
                <div class="bot-status">
                    <h3>A_Rafeh</h3>h3>
                    <span class="status-dot">● Online</span>
                </div>
            </div>
            <div class="header-actions">
                <!-- Naya Voice Control Button -->
                <button class="action-btn stop-btn" onclick="stopVoice()">Stop Voice 🔇</button>
                <button class="action-btn clear-btn" onclick="clearChat()">Clear Chat</button>
            </div>
        </div>

        <!-- Chat Box -->
        <div class="chat-box" id="chatBox">
            <div class="message bot-message">
                <div class="msg-avatar">🤖</div>
                <div class="text">Hello! How can I assist you professionally today?</div>
            </div>
        </div>

        <!-- Typing Indicator -->
        <div class="chat-box" style="flex:none; padding: 0 20px 10px 20px;">
            <div class="typing-indicator" id="typingId">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type your message here..." onkeypress="handleEnter(event)">
            <button class="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById("chatBox");
        const userInput = document.getElementById("userInput");
        const typingId = document.getElementById("typingId");

        function handleEnter(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }

        // Voice ko foran rokne ka function
        function stopVoice() {
            window.speechSynthesis.cancel();
        }

        function clearChat() {
            stopVoice(); // Chat clear hote hi aawaz bhi band ho jaye
            chatBox.innerHTML = `
                <div class="message bot-message">
                    <div class="msg-avatar">🤖</div>
                    <div class="text">Chat cleared. How can I help you now?</div>
                </div>
            `;
        }

        function speakText(text) {
            stopVoice(); // Naya jawab shuru hone se pehle purani voice stop ho jaye

            const cleanText = text.replace(/<\/?[^>]+(>|$)/g, "");
            const utterance = new SpeechSynthesisUtterance(cleanText);
            
            utterance.lang = 'en-US';
            utterance.rate = 1.0;  
            utterance.pitch = 1.0; 

            window.speechSynthesis.speak(utterance);
        }

        async function sendMessage() {
            const messageText = userInput.value.trim();
            if (!messageText) return;

            appendMessage(messageText, "user-message", "👤");
            userInput.value = "";

            typingId.style.display = "flex";
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch("http://127.0.0.1:5000/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: messageText })
                });

                const data = await response.json();
                typingId.style.display = "none";

                appendMessage(data.response, "bot-message", "🤖");
                speakText(data.response);

            } catch (error) {
                typingId.style.display = "none";
                appendMessage("System Error: Unable to connect to backend server.", "bot-message", "🤖");
            }
        }

        function appendMessage(text, className, avatar) {
            const msgDiv = document.createElement("div");
            msgDiv.className = `message ${className}`;

            msgDiv.innerHTML = `
                <div class="msg-avatar">${avatar}</div>
                <div class="text">${text}</div>
            `;

            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
